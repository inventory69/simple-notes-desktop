name: Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to deploy (leave empty for latest published release)'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download latest.json from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          mkdir pages
          if [ -n "$TAG" ]; then
            gh release download "$TAG" --pattern latest.json --dir pages \
              --repo "${{ github.repository }}"
          else
            gh release download --pattern latest.json --dir pages \
              --repo "${{ github.repository }}"
          fi
          test -s pages/latest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
